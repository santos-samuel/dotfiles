# Change prefix to Ctrl+a (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Intuitive splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Enable mouse support
set -g mouse on

# Start windows/panes at 1 (not 0)
set -g base-index 1
setw -g pane-base-index 1

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Arrow keys move between panes
bind Left  select-pane -L
bind Down  select-pane -D
bind Up    select-pane -U
bind Right select-pane -R

# Ctrl+Arrow resizes panes by 5
bind -r C-Left  resize-pane -L 5
bind -r C-Down  resize-pane -D 5
bind -r C-Up    resize-pane -U 5
bind -r C-Right resize-pane -R 5

# New window in current directory
bind c new-window -c "#{pane_current_path}"

# Safer pane/window killing
bind x confirm-before -p "Kill pane #P? (y/n)" kill-pane
bind X confirm-before -p "Kill window #W? (y/n)" kill-window


# Copy / Paste
set -g set-clipboard on
setw -g mode-keys vi

# Disable "release mouse drag to copy and exit copy-mode"
unbind-key -T copy-mode-vi MouseDragEnd1Pane

# Single click clears selection
bind-key -T copy-mode-vi MouseDown1Pane select-pane\; send-keys -X clear-selection

# Drag selection enters copy mode in a way that allows scrolling back out
bind -n MouseDrag1Pane if -Ft= '#{mouse_any_flag}' 'if -Ft= "#{pane_in_mode}" "copy-mode -eM" "send-keys -M"' 'copy-mode -eM'

# Remove default double/triple-click behavior everywhere
unbind -n DoubleClick1Pane
unbind -n TripleClick1Pane
unbind-key -T copy-mode-vi DoubleClick1Pane
unbind-key -T copy-mode-vi TripleClick1Pane

# Root table: double/triple click enters copy mode and selects
bind -n DoubleClick1Pane if -Ft= '#{mouse_any_flag}' \
  'send-keys -M' \
  'select-pane \; if -Ft= "#{pane_in_mode}" "send-keys -X select-word" "copy-mode \; send-keys -X select-word"'

bind -n TripleClick1Pane if -Ft= '#{mouse_any_flag}' \
  'send-keys -M' \
  'select-pane \; if -Ft= "#{pane_in_mode}" "send-keys -X select-line" "copy-mode \; send-keys -X select-line"'

# Copy-mode table: double/triple click only select, do not copy/cancel
bind-key -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word
bind-key -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line

# In copy-mode, scrolling should not extend the current selection
unbind-key -T copy-mode-vi WheelUpPane
unbind-key -T copy-mode-vi WheelDownPane

bind-key -T copy-mode-vi WheelUpPane   select-pane \; send-keys -X stop-selection \; send-keys -X -N 3 scroll-up
bind-key -T copy-mode-vi WheelDownPane select-pane \; send-keys -X stop-selection \; send-keys -X -N 3 scroll-down

# Copy in copy-mode without exiting/jumping to bottom
unbind-key -T copy-mode-vi Enter
unbind-key -T copy-mode-vi y
bind-key -T copy-mode-vi Enter send-keys -X copy-selection
bind-key -T copy-mode-vi y     send-keys -X copy-selection

# Esc exits copy mode and returns to bottom
unbind-key -T copy-mode-vi Escape
bind-key -T copy-mode-vi Escape send-keys -X cancel

# Larger scrollback
set -g history-limit 1000000

# Better responsiveness
set -sg escape-time 0

# plugins
set -g @plugin 'jaclu/tmux-menus'

run '~/.tmux/plugins/tpm/tpm'